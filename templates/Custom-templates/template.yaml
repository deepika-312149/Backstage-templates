apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-customer
  title: Create a new Customer
  description: Registers a customer with name, address and phone in the catalog
  tags:
    - customer
    - crm
spec:
  owner: team-crm
  type: customer
  parameters:
    - title: Customer information
      required:
        - customerName
        - address
        - phoneNumber
        - owner
      properties:
        customerName:
          title: Customer name
          type: string
          description: Full name of the customer
          ui:autofocus: true
        address:
          title: Address
          type: string
          description: Full mailing address
          ui:widget: textarea
          ui:options:
            rows: 3
        phoneNumber:
          title: Phone number
          type: string
          description: Include country code e.g. +91 98765 43210
        owner:
          title: Owning team
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
  steps:
    - id: fetch-template
      name: Populate customer files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          customerName: ${{ parameters.customerName }}
          address: ${{ parameters.address }}
          phoneNumber: ${{ parameters.phoneNumber }}
          owner: ${{ parameters.owner }}
    - id: publish
      name: Create GitHub repository
      action: publish:github
      input:
        allowedHosts:
          - github.com
        description: Customer record for ${{ parameters.customerName }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private
    - id: register
      name: Register customer in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: GitHub repository
        url: ${{ steps['publish'].output.remoteUrl }}
        icon: github
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
